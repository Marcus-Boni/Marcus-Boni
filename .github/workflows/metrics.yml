name: Metrics
on:
  # Roda a automação todos os dias à meia-noite
  schedule: [{cron: "0 0 * * *"}]
  # Permite que você rode o script manualmente se quiser atualizar na hora
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # Remove as estatísticas genéricas para focar apenas no que importa
          base: ""
          # Ativa o card dinâmico de linguagens mais usadas
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
